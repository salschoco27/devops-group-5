stages:
  - test
  - build
  - deploy

# ── Trigger: push ke main/develop + merge request ─────────────────────────────
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  POSTGRES_DB: taskflow
  POSTGRES_USER: taskflow
  POSTGRES_PASSWORD: taskflow_secret
  GO_VERSION: "1.25"

default:
  before_script:
    - cd pbl-taskflow-go

# ── Job 1: go vet ─────────────────────────────────────────────────────────────
vet:
  stage: test
  image: golang:1.25
  script:
    - echo "🔍 Menjalankan go vet..."
    - go vet ./...
    - echo "✅ go vet passed"

# ── Job 2: Unit Test + Race Detector ──────────────────────────────────────────
unit-test:
  stage: test
  image: golang:1.25
  script:
    - echo "🧪 Menjalankan unit test dengan race detector..."
    - go test -race ./... -coverprofile=coverage-unit.out
    - go tool cover -func=coverage-unit.out
    - echo "✅ Unit test passed"
  artifacts:
    name: "coverage-unit-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/coverage-unit.out
    expire_in: 1 week

# ── Job 3: Integration Test + PostgreSQL + Coverage Gate ──────────────────────
integration-test:
  stage: test
  image: golang:1.25
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_HOST_AUTH_METHOD: trust
    DATABASE_URL: "postgres://taskflow:taskflow_secret@postgres:5432/taskflow?sslmode=disable"
  script:
    - echo "⏳ Menunggu PostgreSQL siap..."
    - apt-get update -qq && apt-get install -y postgresql-client
    - |
      until pg_isready -h postgres -U taskflow; do
        echo "Waiting for postgres..."
        sleep 2
      done
    - echo "🧪 Menjalankan integration test + coverage gate..."
    - go test -tags=integration -race ./... -coverprofile=coverage-integration.out
    - go tool cover -func=coverage-integration.out
    - |
      COVERAGE=$(go tool cover -func=coverage-integration.out | tail -1 | awk '{print $3}' | tr -d '%')
      echo "📊 Total Coverage: $COVERAGE%"
      if awk "BEGIN {exit !($COVERAGE < 75)}"; then
        echo "❌ Coverage $COVERAGE% di bawah minimum 75%!"
        exit 1
      fi
      echo "✅ Coverage OK: $COVERAGE%"
    - echo "✅ Integration test passed"
  artifacts:
    name: "coverage-integration-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/coverage-integration.out
    expire_in: 1 week

# ── Job 4: Build Binary ───────────────────────────────────────────────────────
build:
  stage: build
  image: golang:1.25
  script:
    - echo "🔨 Kompilasi binary..."
    - go build -o bin/taskflow-api ./cmd/server
    - echo "✅ Build berhasil"
  artifacts:
    name: "binary-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/bin/taskflow-api
    expire_in: 1 week

# ══════════════════════════════════════════════════════════════════════════════
# CD Stage — Build & Push Docker Image ke GitLab Container Registry
# ══════════════════════════════════════════════════════════════════════════════

# ── Job 5: Docker Build, Smoke Test & Push ────────────────────────────────────
docker-build:
  stage: deploy
  image: docker:24-dind
  services:
    - docker:24-dind
  # Secara eksplisit menyatakan job ini butuh CI (test & build) sukses
  needs: ["vet", "unit-test", "integration-test", "build"]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  before_script:
    - echo "🔐 Login ke GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - cd pbl-taskflow-go
    - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
    - IMAGE_TAG="sha-${SHORT_SHA}"
    - echo "🐳 Building Docker image..."
    - |
      docker build \
        -t ${IMAGE_NAME}:${IMAGE_TAG} \
        .
    
    - echo "🧪 Menjalankan Smoke Test..."
    # Jalankan container di background
    - docker run -d --name smoke-test ${IMAGE_NAME}:${IMAGE_TAG}
    - sleep 5
    # Cek apakah container masih running (tidak crash)
    - |
      if [ "$(docker inspect -f '{{.State.Running}}' smoke-test)" = "true" ]; then
        echo "✅ Smoke test PASS: Container berhasil berjalan tanpa crash."
        docker rm -f smoke-test
      else
        echo "❌ Smoke test FAILED: Container crash setelah dijalankan."
        docker logs smoke-test
        docker rm -f smoke-test
        exit 1
      fi

    - echo "🏷️ Menambahkan tag 'stable' (kondisional karena CI & smoke test PASS)..."
    - docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:stable
    
    - echo "📦 Pushing image ke registry..."
    - docker push ${IMAGE_NAME}:${IMAGE_TAG}
    - docker push ${IMAGE_NAME}:stable
    - echo "✅ Image pushed!"
    - echo "   → ${IMAGE_NAME}:${IMAGE_TAG}"
    - echo "   → ${IMAGE_NAME}:stable"
    - echo ""
    - echo "📊 Ukuran image multi-stage (scratch):"
    - docker images ${IMAGE_NAME}:${IMAGE_TAG} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"