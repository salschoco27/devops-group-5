stages:
  - test
  - security
  - build
  - release
  - deploy

# ── Trigger: push ke main/develop + merge request ─────────────────────────────
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  POSTGRES_DB: taskflow
  POSTGRES_USER: taskflow
  POSTGRES_PASSWORD: taskflow_secret
  GO_VERSION: "1.25"

default:
  before_script:
    - cd pbl-taskflow-go

# ── Job 1: go vet ─────────────────────────────────────────────────────────────
vet:
  stage: test
  image: golang:1.25
  script:
    - echo "🔍 Menjalankan go vet..."
    - go vet ./...
    - echo "✅ go vet passed"

# ── Job 2: Unit Test + Race Detector ──────────────────────────────────────────
unit-test:
  stage: test
  image: golang:1.25
  script:
    - echo "🧪 Menjalankan unit test dengan race detector..."
    - go test -race ./... -coverprofile=coverage-unit.out
    - go tool cover -func=coverage-unit.out
    - echo "✅ Unit test passed"
  artifacts:
    name: "coverage-unit-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/coverage-unit.out
    expire_in: 1 week

# ── Job 3: Integration Test + PostgreSQL + Coverage Gate ──────────────────────
integration-test:
  stage: test
  image: golang:1.25
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_HOST_AUTH_METHOD: trust
    DATABASE_URL: "postgres://taskflow:taskflow_secret@postgres:5432/taskflow?sslmode=disable"
  script:
    - echo "⏳ Menunggu PostgreSQL siap..."
    - apt-get update -qq && apt-get install -y postgresql-client
    - |
      until pg_isready -h postgres -U taskflow; do
        echo "Waiting for postgres..."
        sleep 2
      done
    - echo "🧪 Menjalankan integration test + coverage gate..."
    - go test -tags=integration -race ./... -coverprofile=coverage-integration.out
    - go tool cover -func=coverage-integration.out
    - |
      COVERAGE=$(go tool cover -func=coverage-integration.out | tail -1 | awk '{print $3}' | tr -d '%')
      echo "📊 Total Coverage: $COVERAGE%"
      if awk "BEGIN {exit !($COVERAGE < 75)}"; then
        echo "❌ Coverage $COVERAGE% di bawah minimum 75%!"
        exit 1
      fi
      echo "✅ Coverage OK: $COVERAGE%"
    - echo "✅ Integration test passed"
  artifacts:
    name: "coverage-integration-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/coverage-integration.out
    expire_in: 1 week

# ── Job S6-A: SCA (Dependency Vulnerability Check) ───────────────────────────
sca-dependency-scan:
  stage: security
  image: golang:1.25
  needs: ["vet"]
  script:
    - echo "🔍 Menjalankan SCA (govulncheck) pada dependency..."
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck -json ./... > sca-report.json || true
    - govulncheck ./...
    - echo "✅ SCA Scan selesai"
  artifacts:
    name: "sca-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/sca-report.json
    expire_in: 1 week

# ── Job S6-B: SAST (Static Analysis Security Testing) ──────────────────────────
sast-code-scan:
  stage: security
  image: golang:1.25
  needs: ["vet"]
  allow_failure: false
  script:
    - echo "⚙️ Menginstall gosec..."
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
    - echo "🔍 Menjalankan SAST (gosec)..."
    - gosec -severity high -fmt json -out gosec-report.json ./... || true
    - gosec -severity high ./...
    - echo "✅ SAST Scan selesai"
  artifacts:
    when: always
    name: "sast-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/gosec-report.json 
    expire_in: 1 week

# ── Job S6-C: Secret Scanning (Gitleaks) ─────────────────────────────────────
secret-scanning:
  stage: security
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  needs: ["vet"]
  script:
    - echo "🔍 Menjalankan Secret Scanning (gitleaks)..."
    # Scan project untuk mencari password/token yang bocor
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
    - gitleaks detect --source . --verbose
    - echo "✅ Secret Scan selesaii"
  artifacts:
    name: "gitleaks-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/gitleaks-report.json
    expire_in: 1 week

# ── Job S6-D: Container Image Scanning (Trivy) ───────────────────────────────
container-scanning:
  stage: release
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["docker-build"] # Dijalankan SETELAH image di-build
  variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      echo "🔍 Memindai Vulnerability pada Docker Image: ${IMAGE_NAME}:${IMAGE_TAG}"
      
      # Jalankan Trivy. --exit-code 1 akan membuat pipeline GAGAL jika ada HIGH/CRITICAL vulnerability
      trivy image --exit-code 1 --severity HIGH,CRITICAL --format json --output trivy-report.json ${IMAGE_NAME}:${IMAGE_TAG}
      
      # Tampilkan hasil di terminal untuk log
      trivy image --severity HIGH,CRITICAL ${IMAGE_NAME}:${IMAGE_TAG}
  artifacts:
    name: "trivy-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/trivy-report.json
    expire_in: 1 week

# ── Job 4: Build Binary ───────────────────────────────────────────────────────
build:
  stage: build
  image: golang:1.25
  script:
    - echo "🔨 Kompilasi binary..."
    - go build -o bin/taskflow-api ./cmd/server
    - echo "✅ Build berhasil"
  artifacts:
    name: "binary-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/bin/taskflow-api
    expire_in: 1 week

# ══════════════════════════════════════════════════════════════════════════════
# Release Stage — Build & Push Docker Image (Tag SHA)
# ══════════════════════════════════════════════════════════════════════════════

# ── Job 5: Docker Build Multi-Arch & Push SHA ─────────────────────────────────
docker-build:
  stage: release
  image: docker:24-dind
  services:
    - docker:24-dind
  needs: ["vet", "unit-test", "integration-test", "build", "sca-dependency-scan", "sast-code-scan", "secret-scanning"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  before_script:
    - echo "Login ke GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --name multiarch --driver docker-container --use
    - docker buildx inspect --bootstrap
  script:
    - |
      cd pbl-taskflow-go
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      echo "Building Multi-Arch Docker image (amd64 + arm64)..."
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        -t ${IMAGE_NAME}:${IMAGE_TAG} \
        -t ${IMAGE_NAME}:latest \
        --push \
        .
      echo "Image pushed: ${IMAGE_NAME}:${IMAGE_TAG} (multi-arch)"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ══════════════════════════════════════════════════════════════════════════════
# Deploy Stage — Staging/Dev (Auto) & Production (Manual) via kubectl
# ══════════════════════════════════════════════════════════════════════════════

# ── Job 6: Deploy ke Kubernetes Staging (taskflow-dev) — Auto ─────────────────
deploy-staging:
  stage: deploy
  needs: ["docker-build", "container-scanning"]
  environment:
    name: staging
  tags:
    - local
  before_script: []  # override default before_script (tidak perlu cd pbl-taskflow-go)
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      IMAGE="${CI_REGISTRY_IMAGE}:${IMAGE_TAG}"
      echo "🚀 Deploying ke Kubernetes Staging (taskflow-dev)..."
      echo "→ Image: $IMAGE"

      # Konfigurasi kubeconfig dari GitLab CI variable
      mkdir -p ~/.kube
      echo "$KUBECONFIG_BASE64" | base64 -d > ~/.kube/config
      chmod 600 ~/.kube/config

      # Update image di deployment
      kubectl set image deployment/taskflow-api \
        devops-group-5=$IMAGE \
        -n taskflow-dev

      # Tunggu rollout selesai
      kubectl rollout status deployment/taskflow-api \
        -n taskflow-dev \
        --timeout=120s

      # Verifikasi
      echo "→ Status Pod setelah deploy:"
      kubectl get pods -n taskflow-dev
      echo ""
      echo "→ Image yang sedang berjalan:"
      kubectl get deployment taskflow-api -n taskflow-dev \
        -o jsonpath='{.spec.template.spec.containers[0].image}'
      echo ""
      echo "✅ Deploy ke staging berhasil!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ── Notifikasi Gagal ──────────────────────────────────────────────────────────
notify-failure:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-staging"]
  when: on_failure
  before_script:
    - apk add --no-cache curl
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      MESSAGE="❌ *Deployment GAGAL*%0A*Commit:* sha-${SHORT_SHA}%0A*Link:* ${CI_PIPELINE_URL}"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown"

# ── Notifikasi Berhasil ───────────────────────────────────────────────────────
notify-success:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-staging"]
  when: on_success
  before_script:
    - apk add --no-cache curl
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      MESSAGE="✅ *Deployment Berhasil*%0A*Commit:* sha-${SHORT_SHA}%0A*Link:* ${CI_PIPELINE_URL}"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown"

# ── Job 7: Deploy ke Kubernetes Production (taskflow-prod) — Manual ───────────
deploy-production:
  stage: deploy
  needs: ["deploy-staging"]
  when: manual
  environment:
    name: production
  tags:
    - local
  before_script: []  # override default before_script
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      IMAGE="${CI_REGISTRY_IMAGE}:${IMAGE_TAG}"
      echo "🚀 Deploying ke Kubernetes Production (taskflow-prod)..."
      echo "→ Image: $IMAGE"

      # Konfigurasi kubeconfig dari GitLab CI variable
      mkdir -p ~/.kube
      echo "$KUBECONFIG_BASE64" | base64 -d > ~/.kube/config
      chmod 600 ~/.kube/config

      # Update image di deployment
      kubectl set image deployment/taskflow-api \
        taskflow-api=$IMAGE \
        -n taskflow-prod

      # Tunggu rollout selesai
      kubectl rollout status deployment/taskflow-api \
        -n taskflow-prod \
        --timeout=120s

      # Verifikasi
      echo "→ Status Pod setelah deploy:"
      kubectl get pods -n taskflow-prod
      echo ""
      echo "→ Image yang sedang berjalan:"
      kubectl get deployment taskflow-api -n taskflow-prod \
        -o jsonpath='{.spec.template.spec.containers[0].image}'
      echo ""
      echo "✅ Deploy ke production berhasil!"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"