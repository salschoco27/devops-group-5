stages:
  - test
  - security
  - build
  - release
  - deploy

# ── Trigger: push ke main/develop + merge request ─────────────────────────────
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  POSTGRES_DB: taskflow
  POSTGRES_USER: taskflow
  POSTGRES_PASSWORD: taskflow_secret
  GO_VERSION: "1.25"

default:
  before_script:
    - cd pbl-taskflow-go

# ── Job 1: go vet ─────────────────────────────────────────────────────────────
vet:
  stage: test
  image: golang:1.25
  script:
    - echo "🔍 Menjalankan go vet..."
    - go vet ./...
    - echo "✅ go vet passed"

# ── Job 2: Unit Test + Race Detector ──────────────────────────────────────────
unit-test:
  stage: test
  image: golang:1.25
  script:
    - echo "🧪 Menjalankan unit test dengan race detector..."
    - go test -race ./... -coverprofile=coverage-unit.out
    - go tool cover -func=coverage-unit.out
    - echo "✅ Unit test passed"
  artifacts:
    name: "coverage-unit-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/coverage-unit.out
    expire_in: 1 week

# ── Job 3: Integration Test + PostgreSQL + Coverage Gate ──────────────────────
integration-test:
  stage: test
  image: golang:1.25
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_HOST_AUTH_METHOD: trust
    DATABASE_URL: "postgres://taskflow:taskflow_secret@postgres:5432/taskflow?sslmode=disable"
  script:
    - echo "⏳ Menunggu PostgreSQL siap..."
    - apt-get update -qq && apt-get install -y postgresql-client
    - |
      until pg_isready -h postgres -U taskflow; do
        echo "Waiting for postgres..."
        sleep 2
      done
    - echo "🧪 Menjalankan integration test + coverage gate..."
    - go test -tags=integration -race ./... -coverprofile=coverage-integration.out
    - go tool cover -func=coverage-integration.out
    - |
      COVERAGE=$(go tool cover -func=coverage-integration.out | tail -1 | awk '{print $3}' | tr -d '%')
      echo "📊 Total Coverage: $COVERAGE%"
      if awk "BEGIN {exit !($COVERAGE < 75)}"; then
        echo "❌ Coverage $COVERAGE% di bawah minimum 75%!"
        exit 1
      fi
      echo "✅ Coverage OK: $COVERAGE%"
    - echo "✅ Integration test passed"
  artifacts:
    name: "coverage-integration-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/coverage-integration.out
    expire_in: 1 week

# ── Job S6-A: SCA (Dependency Vulnerability Check) ───────────────────────────
sca-dependency-scan:
  stage: security
  image: golang:1.25
  needs: ["vet"]
  script:
    - echo "🔍 Menjalankan SCA (govulncheck) pada dependency..."
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck -json ./... > sca-report.json || true
    - govulncheck ./...
    - echo "✅ SCA Scan selesai"
  artifacts:
    name: "sca-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/sca-report.json
    expire_in: 1 week

# ── Job S6-B: SAST (Static Analysis Security Testing) ──────────────────────────
sast-code-scan:
  stage: security
  image: golang:1.25
  needs: ["vet"]
  allow_failure: false
  script:
    - echo "⚙️ Menginstall gosec..."
    - go install github.com/securego/gosec/v2/cmd/gosec@v2.20.0
    - echo "🔍 Menjalankan SAST (gosec)..."
    - gosec -fmt json -out gosec-report.json ./... || true
    - gosec ./...
    - echo "✅ SAST Scan selesai"
  artifacts:
    when: always
    name: "sast-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/gosec-report.json 
    expire_in: 1 week

# ── Job S6-C: Secret Scanning (Gitleaks) ─────────────────────────────────────
secret-scanning:
  stage: security
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  needs: ["vet"]
  script:
    - echo "🔍 Menjalankan Secret Scanning (gitleaks)..."
    # Scan project untuk mencari password/token yang bocor
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true
    - gitleaks detect --source . --verbose
    - echo "✅ Secret Scan selesai"
  artifacts:
    name: "gitleaks-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/gitleaks-report.json
    expire_in: 1 week

# ── Job S6-D: Container Image Scanning (Trivy) ───────────────────────────────
container-scanning:
  stage: release
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["docker-build"] # Dijalankan SETELAH image di-build
  variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      echo "🔍 Memindai Vulnerability pada Docker Image: ${IMAGE_NAME}:${IMAGE_TAG}"
      
      # Jalankan Trivy. --exit-code 1 akan membuat pipeline GAGAL jika ada HIGH/CRITICAL vulnerability
      trivy image --exit-code 1 --severity HIGH,CRITICAL --format json --output trivy-report.json ${IMAGE_NAME}:${IMAGE_TAG}
      
      # Tampilkan hasil di terminal untuk log
      trivy image --severity HIGH,CRITICAL ${IMAGE_NAME}:${IMAGE_TAG}
  artifacts:
    name: "trivy-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/trivy-report.json
    expire_in: 1 week

# ── Job 4: Build Binary ───────────────────────────────────────────────────────
build:
  stage: build
  image: golang:1.25
  script:
    - echo "🔨 Kompilasi binary..."
    - go build -o bin/taskflow-api ./cmd/server
    - echo "✅ Build berhasil"
  artifacts:
    name: "binary-$CI_COMMIT_SHORT_SHA"
    paths:
      - pbl-taskflow-go/bin/taskflow-api
    expire_in: 1 week

# ══════════════════════════════════════════════════════════════════════════════
# Release Stage — Build & Push Docker Image (Tag SHA)
# ══════════════════════════════════════════════════════════════════════════════

# ── Job 5: Docker Build & Push SHA ────────────────────────────────────────────
docker-build:
  stage: release
  image: docker:24-dind
  services:
    - docker:24-dind
  needs: ["vet", "unit-test", "integration-test", "build", "sca-dependency-scan", "sast-code-scan", "secret-scanning"]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  before_script:
    - echo "🔐 Login ke GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      cd pbl-taskflow-go
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      echo "🐳 Building Docker image..."
      docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
      echo "📦 Pushing image ke registry..."
      docker push ${IMAGE_NAME}:${IMAGE_TAG}
      echo "✅ Image pushed: ${IMAGE_NAME}:${IMAGE_TAG}"
      echo "📊 Ukuran image multi-stage (scratch):"
      docker images ${IMAGE_NAME}:${IMAGE_TAG} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ══════════════════════════════════════════════════════════════════════════════
# Deploy Stage — Staging (Auto) & Production (Manual)
# ══════════════════════════════════════════════════════════════════════════════

# Job 6: Deploy to Staging (Auto) + Smoke Test + Tag Stable
deploy-staging:
  stage: deploy
  image: docker:24-dind
  services:
    - name: docker:24-dind
      alias: docker # Memastikan alias adalah 'docker'
  needs: ["docker-build", "container-scanning"]
  environment:
    name: staging
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      IMAGE_TAG="sha-${SHORT_SHA}"
      echo "🚀 Deploying ke Staging Environment..."
      
      docker pull ${IMAGE_NAME}:${IMAGE_TAG}

      docker rm -f staging-app || true

      docker run -d --name staging-app -p 8080:8080 ${IMAGE_NAME}:${IMAGE_TAG}

      apk add --no-cache curl

      echo "🧪 Menjalankan Smoke Test..."

      SUCCESS=0
      for i in $(seq 1 15); do
        if curl -sf http://docker:8080/health > /dev/null 2>&1; then
          echo "✅ Server sudah siap!"
          SUCCESS=1
          break
        fi
        echo "  Percobaan $i/15 — menunggu server di http://docker:8080..."
        sleep 2
      done

      if [ $SUCCESS -eq 0 ]; then
        echo "❌ Server tidak siap setelah 30 detik"
        docker logs staging-app
        exit 1
      fi

      # Verifikasi Endpoint Utama
      echo "  → Cek /api/v1/stats..."
      curl -f http://docker:8080/api/v1/stats || {
        echo "❌ Smoke test GAGAL: /api/v1/stats tidak merespons"
        docker logs staging-app
        exit 1
      }

      echo "✅ Smoke test BERHASIL"

      # Tag Stable
      echo "🏷️ Menambahkan tag 'stable'..."
      docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:stable
      docker push ${IMAGE_NAME}:stable
      
      # Cleanup setelah test berhasil
      docker rm -f staging-app
  
  after_script:
    # Cleanup jika job gagal 
    - docker rm -f staging-app || true

# ── Perbaikan Notifikasi 
notify-failure:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-staging"]
  when: on_failure # Hanya jalan jika staging gagal
  before_script:
    - apk add --no-cache curl
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      MESSAGE="❌ *Deployment GAGAL*%0A*Commit:* sha-${SHORT_SHA}%0A*Link:* ${CI_PIPELINE_URL}"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown"

notify-success:
  stage: deploy
  image: alpine:latest
  needs: ["deploy-staging"]
  when: on_success 
  before_script:
    - apk add --no-cache curl
  script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      MESSAGE="✅ *Deployment Berhasil*%0A*Commit:* sha-${SHORT_SHA}%0A*Link:* ${CI_PIPELINE_URL}"
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=Markdown"

# ── Production Deploy (Manual) ───────────────────────────────────────────────
deploy-production:
  stage: deploy
  image: alpine:latest
  when: manual
  environment:
    name: production
  script: echo "Manual production deployment triggered"