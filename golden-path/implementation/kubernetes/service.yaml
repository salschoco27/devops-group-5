apiVersion: v1
kind: Service
metadata:
  name: sample-app-service
  namespace: golden-path-dev
  labels:
    app: sample-app
    managed-by: golden-path        
    environment: dev
spec:
  type: NodePort

  selector:
    app: sample-app

  ports:
    - name: http
      protocol: TCP
      port: 80       
      targetPort: 8080 
      nodePort: 30080
      