apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-api
  template:
    metadata:
      labels:
        app: taskflow-api
    spec:
      containers:
        - name: taskflow-api
          image: registry.gitlab.com/adlyatarisa/devops-group-5:stable
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"